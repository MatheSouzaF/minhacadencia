services:
  postgres:
    image: postgres:16-alpine
    container_name: rotina-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rotina
      POSTGRES_PASSWORD: rotina123
      POSTGRES_DB: rotina_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rotina-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://rotina:rotina123@postgres:5432/rotina_db
      JWT_SECRET: super_secret_jwt_key_change_in_production
      JWT_REFRESH_SECRET: super_secret_refresh_key_change_in_production
      PORT: 3002
      NODE_ENV: development
    ports:
      - "3002:3002"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
